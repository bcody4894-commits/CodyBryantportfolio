<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layout | Cody Bryant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

<style>
body.art-page {
    padding: 20px;
    text-align: center;
}

.page-title {
    margin: 20px 0 30px 0;
}

.back {
    display: inline-block;
    margin-bottom: 20px;
    padding: 8px 12px;
    border: 2px solid #000;
    border-radius: 6px;
    background-color: #ccc;
    text-decoration: none;
    color: #000;
    font-weight: bold;
}

.back:hover {
    background-color: #aaa;
}

.work-section {
    position: relative;
}

.white-overlay {
    position: absolute;
    inset: 0;
    background: #ffffff;
    z-index: -1;
}

/* MOBILE ONLY FIX */
@media (max-width: 480px) {

    .logo-container {
        position: relative;
        margin-bottom: 40px;
    }

    .logo-container.row {
        display: block;
    }

    .colored-box,
    .colored-box-second {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .colored-box {
        background-color: #f5efd7;
    }

    .colored-box-second {
        background-color: #bddfed;
    }

    .about-image {
        position: relative;
        z-index: 2;
        width: 100%;
        height: auto;
        display: block;
        margin-top: 10px;
    }

    .poster-container {
        margin-top: 10px;
        display: flex;
        justify-content: center;
        gap: 5px;
        position: relative;
        z-index: 5;
    }

    .poster-container img {
        width: 140px; /* bigger mobile size */
        height: auto;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .poster-container img:hover {
        transform: scale(1.35); /* stronger hover */
        box-shadow: 0 0 35px rgba(91, 142, 178, 0.8);
    }
}

/* DESKTOP */
@media (min-width: 481px) {

    .logo-container {
        position: relative;
        margin-left: 20px;
        margin-bottom: 40px;
    }

    .logo-container.single {
        max-width: 900px;
    }

    .logo-container.row {
        display: flex;
        align-items: flex-start;
        gap: 40px;
        max-width: 1800px;
        position: relative;
    }

    .colored-box {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100%;
        background-color: #f5efd7;
        z-index: 1;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        padding-left: 20px;
        padding-right: 20px;
        box-sizing: border-box;
    }

    .colored-box-second {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100%;
        background-color: #bddfed;
        z-index: 1;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        padding-left: 20px;
        padding-right: 20px;
        box-sizing: border-box;
    }

    .about-image {
        position: relative;
        z-index: 2;
        width: 900px;
        height: auto;
        display: block;
    }

    .bugposter-column {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        position: relative;
        z-index: 2;
    }

    .poster-container {
        display: flex;
        gap: 20px;
        margin-top: 10px;
        position: relative;
        z-index: 5;
    }

    .poster-container img {
        width: 300px; /* bigger desktop size */
        height: auto;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .poster-container img:hover {
        transform: scale(1.3); /* stronger hover */
        box-shadow: 0 0 50px rgba(91, 142, 178, 0.8);
    }
}
</style>
</head>

<body class="art-page">

<nav class="navbar">
    <a href="index.html" class="back">← Back</a>
</nav>

<section class="work-section">

    <div class="white-overlay"></div>

    <h1 class="page-title">Layout</h1>

    <!-- First Image -->
    <div class="logo-container single">
        <div class="colored-box"></div>
        <img src="images/fatratlogo.jpg" class="about-image">
    </div>

    <!-- Second Section -->
    <div class="logo-container row">
        <div class="colored-box-second"></div>
        <img src="images/stag.jpg" class="about-image">

        <div class="bugposter-column">
            <img src="images/bugposter.jpg" class="about-image">

            <div class="poster-container">
                <img src="images/acorn.png">
                <img src="images/frog.png">
                <img src="images/bug cover.png">
            </div>
        </div>

    </div>

</section>

</body>
</html>
