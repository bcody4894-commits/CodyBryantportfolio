<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Art | Cody Bryant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>
body.art-page {
    padding: 20px;
    text-align: center;
    font-family: Arial, Helvetica, sans-serif;
}

.page-title {
    margin: 20px 0 30px 0;
}

.back {
    display: inline-block;
    margin-bottom: 20px;
    padding: 8px 12px;
    border: 2px solid #000;
    border-radius: 6px;
    background-color: #ccc;
    text-decoration: none;
    color: #000;
    font-weight: bold;
}

.back:hover {
    background-color: #aaa;
}

.work-section {
    position: relative;
}

.white-overlay {
    position: absolute;
    inset: 0;
    background: #ffffff;
    z-index: -1;
}

/* MOBILE */
@media (max-width: 480px) {

    .logo-container {
        position: relative;
        margin-bottom: 40px;
    }

    .colored-box {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f5efd7;
        z-index: 1;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .about-image {
        position: relative;
        z-index: 2;
        width: 100%;
        height: auto;
        display: block;
        margin-top: 10px;
    }
}

/* DESKTOP */
@media (min-width: 481px) {

    .logo-container {
        position: relative;
        margin-left: 20px;
        margin-bottom: 40px;
        max-width: 900px;
    }

    .colored-box {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100%;
        background-color: #f5efd7;
        z-index: 1;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        padding-left: 20px;
        padding-right: 20px;
        box-sizing: border-box;
    }

    .about-image {
        position: relative;
        z-index: 2;
        width: 900px;
        height: auto;
        display: block;
    }
}
</style>
</head>

<body class="art-page">

<nav>
<a href="index.html" class="back">← Back</a>
</nav>

<section class="work-section">

<div class="white-overlay"></div>

<h1 class="page-title">3D Art</h1>

<div class="logo-container">
    <div class="colored-box"></div>
    <img src="images/matgril.png" class="about-image" alt="3D Art">
</div>

</section>

</body>
</html>
