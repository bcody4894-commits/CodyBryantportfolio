<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Games | Cody Bryant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>

body.art-page{
    font-family: Arial, Helvetica, sans-serif;
    background:#ffffed;
    color:#000;
    padding:20px;
    text-align:center;
}

.page-title{
    margin:20px 0 30px 0;
}

.back{
    display:inline-block;
    margin-bottom:20px;
    padding:8px 12px;
    border:2px solid #000;
    border-radius:6px;
    background-color:#ccc;
    text-decoration:none;
    color:#000;
    font-weight:bold;
}

.back:hover{
    background-color:#aaa;
}

/* top game image */

.main-menu-image{
    width:85%;
    max-width:900px;
    margin-bottom:60px;
    border-radius:6px;
}

/* layout row */

.game-row{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:80px;
    flex-wrap:wrap;
}

/* left image */

.main-scene{
    width:420px;
    border-radius:6px;
}

/* right column */

.right-column{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* video */

video{
    width:420px;
    height:250px;
    object-fit:cover;
    transform:scale(1.25);
    border-radius:6px;
    margin-bottom:40px;
}

/* text */

.walk-text{
    font-family: Arial, sans-serif;
    font-size:36px;
    color:#000;
    margin-bottom:40px;
}

/* rating image */

.rating-image{
    width:340px;
}

@media(max-width:900px){

.game-row{
    flex-direction:column;
    align-items:center;
}

.main-scene{
    width:80%;
}

video{
    width:80%;
}

.rating-image{
    width:60%;
}

}

</style>
</head>

<body class="art-page">

<nav class="navbar">
<a href="index.html" class="back">← Back</a>
</nav>

<section class="work-section">

<h1 class="page-title">Games</h1>

<img src="images/main menu.png" alt="Main Menu" class="main-menu-image">

<div class="game-row">

<img src="images/mainscene.png" alt="Main Scene" class="main-scene">

<div class="right-column">

<video src="images/player.mp4" autoplay muted loop></video>

<div class="walk-text">Player Walk Cycle</div>

<img src="images/rating.png" alt="Rating" class="rating-image">

</div>

</div>

</section>

</body>
</html>
