<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Games | Cody Bryant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Ekamai Font -->
<link href="https://fonts.cdnfonts.com/css/ekamai" rel="stylesheet">

<style>

body.art-page {
    padding: 20px;
    text-align: center;
    background-color: #ffffed;
    font-family: Arial, Helvetica, sans-serif;
    color: #000;
}

.back {
    display: inline-block;
    margin-bottom: 20px;
    padding: 8px 12px;
    border: 2px solid #000;
    border-radius: 6px;
    background-color: #ccc;
    text-decoration: none;
    color: #000;
    font-weight: bold;
}

.back:hover {
    background-color: #aaa;
}

/* TOP MAIN MENU IMAGE */

.main-menu-top {
    padding: 30px;
}

.main-menu-top img {
    width: 80%;
    max-width: 1200px;
    height: auto;
    display: block;
    margin: 0 auto;
}

/* MAIN SCENE + VIDEO */

.scene-video-container {
    display: flex;
    justify-content: flex-start;
    align-items: flex-start;
    padding: 30px;
    gap: 20px;
    flex-wrap: wrap;
}

.main-scene img {
    width: 60%;
    max-width: 850px;
    height: auto;
}

.video-rating-container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.scene-video-container video {
    width: 60%;
    max-width: 600px;
    height: auto;
    object-fit: cover;
    transform: scale(1.5);
    display: block;
}

/* PLAYER WALK CYCLE TEXT */

.walk-text {
    font-family: 'Ekamai', sans-serif;
    font-size: 28px;
    margin-top: 35px;
    margin-bottom: 35px;
}

/* RATING IMAGE */

.rating-image {
    width: 90%;
    max-width: 750px;
    display: block;
}

/* GAME IMAGE SECTION */

.logo-container.row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    max-width: 1800px;
    margin-left: auto;
    margin-right: auto;
}

.about-image {
    width: 750px;
    height: auto;
    margin: 10px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.about-image:hover {
    transform: scale(1.3);
    box-shadow: 0 0 50px rgba(91,142,178,0.8);
}

.image-pair {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
}

/* MOBILE */

@media (max-width: 768px) {

.scene-video-container {
    flex-direction: column;
    align-items: center;
}

.main-scene img,
.scene-video-container video,
.rating-image {
    width: 90%;
    max-width: 500px;
    margin-bottom: 20px;
    transform: scale(1.2);
}

.walk-text {
    font-size: 22px;
}

}

@media (max-width: 480px) {

.about-image {
    width: 240px;
}

.image-pair {
    flex-direction: column;
    gap: 15px;
}

}

</style>
</head>

<body class="art-page">

<nav class="navbar">
<a href="index.html" class="back">← Back</a>
</nav>

<section class="work-section">

<!-- TOP IMAGE -->
<div class="main-menu-top">
<img src="images/main menu.png" alt="Main Menu">
</div>

<!-- MAIN SCENE + VIDEO -->
<div class="scene-video-container">

<img src="images/mainscene.png" alt="Main Scene" class="main-scene">

<div class="video-rating-container">

<video src="images/player.mp4" autoplay muted loop></video>

<div class="walk-text">
Player Walk Cycle
</div>

<img src="images/rating.png" alt="Rating" class="rating-image">

</div>
</div>

<!-- GAME IMAGES -->

<div class="logo-container row">
<div class="image-pair">
<img src="images/game2.png" class="about-image" alt="Game 2">
<img src="images/game3.png" class="about-image" alt="Game 3">
</div>
</div>

</section>

</body>
</html>
