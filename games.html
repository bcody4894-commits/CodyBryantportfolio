<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Games | Cody Bryant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body.art-page {
    padding: 20px;
    text-align: center;
    background-color: #ffffed;
    font-family: Arial, Helvetica, sans-serif;
    color: #000;
}

.page-title {
    margin: 20px 0 30px 0;
}

.back {
    display: inline-block;
    margin-bottom: 20px;
    padding: 8px 12px;
    border: 2px solid #000;
    border-radius: 6px;
    background-color: #ccc;
    text-decoration: none;
    color: #000;
    font-weight: bold;
}

.back:hover {
    background-color: #aaa;
}

.work-section {
    position: relative;
}

/* TOP MAIN MENU IMAGE */
.main-menu-top {
    padding: 30px;
}

.main-menu-top img {
    width: 80%;
    max-width: 1200px;
    height: auto;
    display: block;
    margin: 0 auto;
}

/* MAIN SCENE IMAGE AND VIDEO SIDE BY SIDE */
.scene-video-container {
    display: flex;
    justify-content: flex-start;
    align-items: flex-start;
    padding: 30px;
    gap: 20px;
    flex-wrap: wrap; /* stack on mobile */
    position: relative;
}

.main-scene img {
    width: 70%;
    max-width: 1000px;
    height: auto;
}

.video-rating-container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.scene-video-container video {
    width: 50%; /* slightly bigger */
    max-width: 500px;
    height: auto;
    object-fit: cover;
    transform: scale(1.4); /* zoomed in */
    display: block;
}

.rating-image {
    width: 60%; /* bigger than before */
    max-width: 550px;
    margin-top: 40px; /* more spacing from video */
    display: block;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
    .scene-video-container {
        flex-direction: column;
        align-items: center;
    }

    .main-scene img,
    .scene-video-container video,
    .rating-image {
        width: 90%;
        max-width: 500px;
        margin-bottom: 20px;
        transform: scale(1.2);
    }

    .rating-image {
        margin-top: 25px; /* adjusted for mobile */
    }
}

/* MOBILE AND DESKTOP STYLES FOR GAME PAIRS */
@media (max-width: 480px) {

    .logo-container {
        position: relative;
        margin-bottom: 40px;
    }

    .logo-container.row {
        display: block;
    }

    .about-image {
        position: relative;
        width: 100%;
        height: auto;
        display: block;
        margin-top: 10px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .about-image:hover {
        transform: scale(1.1);
        box-shadow: 0 0 25px rgba(91,142,178,0.6);
    }

    .image-pair {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
    }

    .image-pair img {
        width: 240px;
        height: auto;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .image-pair img:hover {
        transform: scale(1.35);
        box-shadow: 0 0 35px rgba(91,142,178,0.8);
    }
}

@media (min-width: 481px) {

    .logo-container {
        position: relative;
        margin-left: 20px;
        margin-bottom: 40px;
    }

    .logo-container.row {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        max-width: 1800px;
    }

    .about-image {
        position: relative;
        width: 900px;
        height: auto;
        display: block;
        margin: 10px auto;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .about-image:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(91,142,178,0.6);
    }

    .image-pair {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 10px;
    }

    .image-pair img {
        width: 750px;
        height: auto;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .image-pair img:hover {
        transform: scale(1.3);
        box-shadow: 0 0 50px rgba(91,142,178,0.8);
    }
}

</style>
</head>

<body class="art-page">

<nav class="navbar">
<a href="index.html" class="back">← Back</a>
</nav>

<section class="work-section">

<!-- TOP MAIN MENU IMAGE -->
<div class="main-menu-top">
<img src="images/main menu.png" alt="Main Menu">
</div>

<!-- MAIN SCENE IMAGE AND VIDEO SIDE BY SIDE -->
<div class="scene-video-container">
    <img src="images/mainscene.png" alt="Main Scene" class="main-scene">
    <div class="video-rating-container">
        <video src="images/player.mp4" autoplay muted loop></video>
        <img src="images/rating.png" alt="Rating" class="rating-image">
    </div>
</div>

<!-- Only one game section remains -->
<div class="logo-container row">
    <div class="image-pair">
        <img src="images/game2.png" class="about-image" alt="Game 2">
        <img src="images/game3.png" class="about-image" alt="Game 3">
    </div>
</div>

</section>

</body>
</html>
