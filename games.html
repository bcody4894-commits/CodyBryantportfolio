<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Games | Cody Bryant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body.art-page {
    padding: 20px;
    text-align: center;
    background-color: #ffffed; /* updated background */
    font-family: Arial, Helvetica, sans-serif;
    color: #000;
}

.page-title {
    margin: 20px 0 30px 0;
}

.back {
    display: inline-block;
    margin-bottom: 20px;
    padding: 8px 12px;
    border: 2px solid #000;
    border-radius: 6px;
    background-color: #ccc;
    text-decoration: none;
    color: #000;
    font-weight: bold;
}

.back:hover {
    background-color: #aaa;
}

.work-section {
    position: relative;
}

/* TOP MAIN MENU IMAGE */
.main-menu-top {
    padding: 30px; /* same padding as bug3d */
}

.main-menu-top img {
    width: 80%; /* big */
    max-width: 1200px;
    height: auto;
    display: block;
    margin: 0 auto;
}

/* MAIN SCENE IMAGE */
.main-scene {
    padding: 30px; /* same padding */
    text-align: left; /* align left */
}

.main-scene img {
    width: 70%; /* slightly smaller than main menu */
    max-width: 1000px;
    height: auto;
    display: block;
}

/* MOBILE */
@media (max-width: 480px) {

    .logo-container {
        position: relative;
        margin-bottom: 40px;
    }

    .logo-container.row {
        display: block;
    }

    .about-image {
        position: relative;
        width: 100%;
        height: auto;
        display: block;
        margin-top: 10px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .about-image:hover {
        transform: scale(1.1);
        box-shadow: 0 0 25px rgba(91,142,178,0.6);
    }

    .image-pair {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
    }

    .image-pair img {
        width: 240px;
        height: auto;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .image-pair img:hover {
        transform: scale(1.35);
        box-shadow: 0 0 35px rgba(91,142,178,0.8);
    }
}

/* DESKTOP */
@media (min-width: 481px) {

    .logo-container {
        position: relative;
        margin-left: 20px;
        margin-bottom: 40px;
    }

    .logo-container.row {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        max-width: 1800px;
    }

    .about-image {
        position: relative;
        width: 900px;
        height: auto;
        display: block;
        margin: 10px auto;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .about-image:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(91,142,178,0.6);
    }

    .image-pair {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 10px;
    }

    .image-pair img {
        width: 750px;
        height: auto;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .image-pair img:hover {
        transform: scale(1.3);
        box-shadow: 0 0 50px rgba(91,142,178,0.8);
    }
}

</style>
</head>

<body class="art-page">

<nav class="navbar">
<a href="index.html" class="back">← Back</a>
</nav>

<section class="work-section">

<!-- TOP MAIN MENU IMAGE -->
<div class="main-menu-top">
<img src="images/main menu.png" alt="Main Menu">
</div>

<!-- MAIN SCENE IMAGE -->
<div class="main-scene">
<img src="images/mainscene.png" alt="Main Scene">
</div>

<!-- Game Sections (example 3D-style pairs) -->
<div class="logo-container row">
    <div class="image-pair">
        <img src="images/game2.png" class="about-image" alt="Game 2">
        <img src="images/game3.png" class="about-image" alt="Game 3">
    </div>
</div>

<div class="logo-container row">
    <div class="image-pair">
        <img src="images/game4.png" class="about-image" alt="Game 4">
        <img src="images/game5.png" class="about-image" alt="Game 5">
    </div>
</div>

</section>

</body>
</html>
