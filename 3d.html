<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Art | Cody Bryant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>
body.art-page {
    padding: 20px;
    text-align: center;
    font-family: Arial, Helvetica, sans-serif;
}

.page-title {
    margin: 20px 0 30px 0;
}

.back {
    display: inline-block;
    margin-bottom: 20px;
    padding: 8px 12px;
    border: 2px solid #000;
    border-radius: 6px;
    background-color: #ccc;
    text-decoration: none;
    color: #000;
    font-weight: bold;
}

.back:hover {
    background-color: #aaa;
}

.work-section {
    position: relative;
}

.white-overlay {
    position: absolute;
    inset: 0;
    background: #ffffff;
    z-index: -1;
}

/* container */
.logo-container {
    position: relative;
    margin: auto;
    max-width: 1000px;
}

/* colored background */
.colored-box {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #707070;
    z-index: 1;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* images row */
.image-row {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 40px 20px;
    flex-wrap: wrap;
}

/* image styling */
.image-row img {
    width: 220px;
    height: auto;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.image-row img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(0,0,0,0.4);
}

/* mobile */
@media (max-width: 480px) {

.image-row img {
    width: 140px;
}

}
</style>
</head>

<body class="art-page">

<nav>
<a href="index.html" class="back">← Back</a>
</nav>

<section class="work-section">

<div class="white-overlay"></div>

<h1 class="page-title">3D Art</h1>

<div class="logo-container">

<div class="colored-box"></div>

<div class="image-row">
<img src="images/matgril.png" alt="Mat Girl">
<img src="images/bust.png" alt="Bust">
<img src="images/bussidet.png" alt="Bust Side">
</div>

</div>

</section>

</body>
</html>
