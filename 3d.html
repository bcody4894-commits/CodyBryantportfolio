<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body.art-page {
    padding: 20px;
    text-align: center;
    background-color: #020c15;
}

.page-title {
    margin: 20px 0 30px 0;
}

.back {
    display: inline-block;
    margin-bottom: 20px;
    padding: 8px 12px;
    border: 2px solid #000;
    border-radius: 6px;
    background-color: #ccc;
    text-decoration: none;
    color: #000;
    font-weight: bold;
}

.back:hover {
    background-color: #aaa;
}

.work-section {
    position: relative;
}

/* TOP BUG IMAGE */
.bug-top {
    padding: 30px;
}

.bug-top img {
    width: 100%;
    height: auto;
    display: block;
}

/* MOBILE */
@media (max-width: 480px) {

    .logo-container {
        position: relative;
        margin-bottom: 40px;
    }

    .logo-container.row {
        display: block;
    }

    .about-image {
        position: relative;
        width: 100%;
        height: auto;
        display: block;
        margin-top: 10px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .about-image:hover {
        transform: scale(1.1);
        box-shadow: 0 0 25px rgba(91,142,178,0.6);
    }

    .image-pair {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
    }

    .image-pair img {
        width: 240px; /* increased from 200px */
        height: auto;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .image-pair img:hover {
        transform: scale(1.35);
        box-shadow: 0 0 35px rgba(91,142,178,0.8);
    }
}

/* DESKTOP */
@media (min-width: 481px) {

    .logo-container {
        position: relative;
        margin-left: 20px;
        margin-bottom: 40px;
    }

    .logo-container.row {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        max-width: 1800px;
    }

    .about-image {
        position: relative;
        width: 900px; /* increased from 800px */
        height: auto;
        display: block;
        margin: 10px auto;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .about-image:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(91,142,178,0.6);
    }

    .image-pair {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 10px;
    }

    .image-pair img {
        width: 750px; /* increased from 650px */
        height: auto;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .image-pair img:hover {
        transform: scale(1.3);
        box-shadow: 0 0 50px rgba(91,142,178,0.8);
    }
}

</style>
</head>

<body class="art-page">

<nav class="navbar">
<a href="index.html" class="back">← Back</a>
</nav>

<section class="work-section">

<!-- TOP BUG IMAGE -->
<div class="bug-top">
<img src="images/bug3d.png" alt="3D Bug">
</div>

<!-- First Section -->
<div class="logo-container row">

<div class="image-pair">
<img src="images/maingril.png" class="about-image" alt="Mat Girl">
<img src="images/zbrush.png" class="about-image" alt="ZBrush">
</div>

</div>

<!-- Second Section -->
<div class="logo-container row">

<div class="image-pair">
<img src="images/bust.png" class="about-image" alt="Bust">
<img src="images/bussidet.png" class="about-image" alt="Side Bust">
</div>

</div>

</section>

</body>
</html>
