<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body.art-page {
    padding: 20px;
    text-align: center;
}

.page-title {
    margin: 20px 0 30px 0;
}

.back {
    display: inline-block;
    margin-bottom: 20px;
    padding: 8px 12px;
    border: 2px solid #000;
    border-radius: 6px;
    background-color: #ccc;
    text-decoration: none;
    color: #000;
    font-weight: bold;
}

.back:hover {
    background-color: #aaa;
}

.work-section {
    position: relative;
}

.white-overlay {
    position: absolute;
    inset: 0;
    background: #ffffff;
    z-index: -1;
}

/* MOBILE ONLY FIX */
@media (max-width: 480px) {

    .logo-container {
        position: relative;
        margin-bottom: 40px;
    }

    .logo-container.row {
        display: block;
    }

    .colored-box,
    .colored-box-second {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .colored-box {
        background-color: #020c15;
    }

    .colored-box-second {
        background-color: #020c15;
    }

    .about-image {
        position: relative;
        z-index: 2;
        width: 100%;
        height: auto;
        display: block;
        margin-top: 10px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .about-image:hover {
        transform: scale(1.1);
        box-shadow: 0 0 25px rgba(91, 142, 178, 0.6);
    }

    .image-pair {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
    }

    .image-pair img {
        width: 200px;
        height: auto;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .image-pair img:hover {
        transform: scale(1.35);
        box-shadow: 0 0 35px rgba(91, 142, 178, 0.8);
    }
}

/* DESKTOP */
@media (min-width: 481px) {

    .logo-container {
        position: relative;
        margin-left: 20px;
        margin-bottom: 40px;
    }

    .logo-container.single {
        max-width: 900px;
    }

    .logo-container.row {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        max-width: 1800px;
        position: relative;
    }

    .colored-box {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100%;
        background-color: #020c15;
        z-index: 1;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        padding-left: 20px;
        padding-right: 20px;
        box-sizing: border-box;
    }

    .colored-box-second {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100%;
        background-color: #020c15;
        z-index: 1;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        padding-left: 20px;
        padding-right: 20px;
        box-sizing: border-box;
    }

    .about-image {
        position: relative;
        z-index: 2;
        width: 800px;
        height: auto;
        display: block;
        margin: 10px auto;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .about-image:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(91, 142, 178, 0.6);
    }

    .image-pair {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 10px;
    }

    .image-pair img {
        width: 650px;
        height: auto;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .image-pair img:hover {
        transform: scale(1.3);
        box-shadow: 0 0 50px rgba(91, 142, 178, 0.8);
    }
}
</style>
</head>

<body class="art-page">

<nav class="navbar">
    <a href="index.html" class="back">← Back</a>
</nav>

<section class="work-section">

    <div class="white-overlay"></div>

    <!-- First Section with Mat Girl and ZBrush -->
    <div class="logo-container row">
        <div class="colored-box"></div>

        <div class="image-pair">
            <img src="images/maingril.png" class="about-image" alt="Mat Girl">
            <img src="images/zbrush.png" class="about-image" alt="ZBrush">
        </div>
    </div>

    <!-- Second Section with Bust and Side Bust -->
    <div class="logo-container row">
        <div class="colored-box-second"></div>

        <div class="image-pair">
            <img src="images/bust.png" class="about-image" alt="Bust">
            <img src="images/bussidet.png" class="about-image" alt="Side Bust">
        </div>

    </div>

</section>

</body>
</html>
