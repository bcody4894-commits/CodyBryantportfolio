<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Concept Art | Cody Bryant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Ekamai Font -->
<link href="https://fonts.cdnfonts.com/css/ekamai" rel="stylesheet">

<style>

body.art-page {
    padding: 20px;
    text-align: center;
    background-color: #ffffed;
    font-family: Arial, Helvetica, sans-serif;
    color: #000;
}

.back {
    display: inline-block;
    margin-bottom: 20px;
    padding: 8px 12px;
    border: 2px solid #000;
    border-radius: 6px;
    background-color: #ccc;
    text-decoration: none;
    color: #000;
    font-weight: bold;
}

.back:hover {
    background-color: #aaa;
}

/* MAIN IMAGE AREA */

.concept-container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
}

.concept-container img {
    width: 80%;
    max-width: 1000px;
    height: auto;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.concept-container img:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
}

/* MOBILE */

@media (max-width: 768px) {

.concept-container img {
    width: 95%;
}

}

</style>
</head>

<body class="art-page">

<nav class="navbar">
<a href="index.html" class="back">← Back</a>
</nav>

<section class="work-section">

<div class="concept-container">
<img src="images/goob.png" alt="Goob Concept Art">
</div>

</section>

</body>
</html>
