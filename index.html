<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layout | Cody Bryant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Only for the 2D page */
        body.art-page {
            padding: 20px;
            text-align: center;
        }

        .page-title {
            margin: 20px 0 30px 0;
        }

        .back {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 12px;
            border: 2px solid #000;
            border-radius: 6px;
            background-color: #ccc;
            text-decoration: none;
            color: #000;
            font-weight: bold;
        }

        .back:hover {
            background-color: #aaa;
        }

        .work-grid img {
            width: 60%;
            height: auto;
            border: 3px solid #000;
            border-radius: 6px;
            object-fit: cover;
            transition: transform 0.2s;
        }

        .work-grid img:hover {
            transform: scale(1.05);
        }

        @media (max-width: 480px) {
            .work-grid {
                grid-template-columns: 1fr;
            }

            .work-grid img {
                height: auto;
            }
        }

        /* WHITE BLOCK OVERLAY FOR 2D PAGE */
        body.art-page .work-section {
            position: relative;
        }

        body.art-page .white-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            z-index: 0; /* behind images/buttons */
        }

        body.art-page .about-image-wrapper,
        body.art-page .work-grid {
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body class="art-page">

<nav class="navbar">
    <a href="index.html" class="back">← Back</a>
</nav>

<section class="work-section">

    <!-- WHITE OVERLAY BLOCK -->
    <div class="white-overlay"></div>

    <h1 class="page-title">Layout</h1>

    <div class="about-image-wrapper">
        <img src="images/fatratlogo.jpg" alt="Layout Art" class="about-image">
    </div>

    <!-- Work grid removed completely; only the image remains -->
    <div class="work-grid">
        <!-- No buttons here -->
    </div>

</section>

</body>
</html>
